name: Generate Changelog  

on:  
  release:  
    types: [published]  # 每当发布新版本时触发  

permissions:
  contents: write  # 需要写入权限来提交 CHANGELOG.md

jobs:  
  changelog:  
    runs-on: ubuntu-latest  

    steps:  
      - name: Checkout code  
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}  # Checkout 到默认分支而不是 tag
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js  
        uses: actions/setup-node@v4  
        with:  
          node-version: '20'  # 使用更新的 Node.js 版本  

      - name: Generate Changelog  
        run: npx auto-changelog -p  
        env:  
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  

      - name: Create Pull Request for Changelog
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update changelog'
          title: 'chore: Update CHANGELOG for ${{ github.event.release.tag_name }}'
          body: |
            Auto-generated changelog update for release ${{ github.event.release.tag_name }}
            
            This PR was automatically created by GitHub Actions.
          branch: changelog-${{ github.event.release.tag_name }}
          delete-branch: true
          labels: |
            automated
            changelog
